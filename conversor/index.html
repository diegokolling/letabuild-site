<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Satoshi ↔ BRL ↔ USD | Tempo Real</title>
    <meta name="description" content="Converta Satoshis para Reais e Dólares em tempo real. Cotação ao vivo do Bitcoin com poder de compra em sats.">
    <meta property="og:title" content="Conversor Satoshi ↔ BRL ↔ USD | Tempo Real">
    <meta property="og:description" content="Converta Satoshis para Reais e Dólares em tempo real. Cotação ao vivo do Bitcoin com poder de compra em sats.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://letabuild.com">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
<script src="/theme-toggle.js"></script>
<script src="/lang-toggle.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <a href="/" class="back-home" title="Voltar para letabuild.com">←</a>
                <svg class="logo-icon" viewBox="0 0 32 32" width="32" height="32">
                    <circle cx="16" cy="16" r="16" fill="#F7931A"/>
                    <text x="16" y="22" text-anchor="middle" fill="#fff" font-size="20" font-weight="700" font-family="Inter, sans-serif">₿</text>
                </svg>
                <h1>SAT Converter</h1>
            </div>
            <button id="langToggle" style="background:none;border:1px solid rgba(224,138,58,0.15);color:#b0a090;min-width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;padding:0 8px;"></button>
            <button id="themeToggle" style="background:none;border:1px solid rgba(224,138,58,0.15);color:#b0a090;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;" title="Alternar tema"></button>
            <div class="status-bar">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText" data-pt="Conectando..." data-en="Connecting...">Conectando...</span>
            </div>
        </header>

        <section class="market-info" id="marketInfo">
            <div class="market-card">
                <span class="market-label">BTC/BRL</span>
                <span class="market-value" id="btcBrl">--</span>
                <span class="market-change" id="btcBrlChange">--</span>
            </div>
            <div class="market-card">
                <span class="market-label">BTC/USD</span>
                <span class="market-value" id="btcUsd">--</span>
                <span class="market-change" id="btcUsdChange">--</span>
            </div>
            <div class="market-card">
                <span class="market-label">Market Cap</span>
                <span class="market-value" id="marketCap">--</span>
                <span class="market-change market-change-neutral">USD</span>
            </div>
        </section>

        <section class="converter-card">
            <h2 class="section-title" data-pt="Conversor" data-en="Converter">Conversor</h2>
            <div class="converter-fields">
                <div class="input-group">
                    <label for="satsInput">
                        <span class="input-icon">⚡</span>
                        Satoshis
                    </label>
                    <input type="text" id="satsInput" inputmode="numeric" placeholder="0" autocomplete="off">
                    <span class="input-hint">1 BTC = 100,000,000 sats</span>
                </div>
                <div class="input-group">
                    <label for="brlInput">
                        <span class="input-icon">R$</span>
                        <span data-pt="Reais" data-en="Brazilian Real">Reais</span>
                    </label>
                    <input type="text" id="brlInput" inputmode="decimal" placeholder="0,00" autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="usdInput">
                        <span class="input-icon">$</span>
                        <span data-pt="Dolares" data-en="Dollars">Dólares</span>
                    </label>
                    <input type="text" id="usdInput" inputmode="decimal" placeholder="0.00" autocomplete="off">
                </div>
            </div>
            <div class="last-update">
                <span data-pt="Atualizado:" data-en="Updated:">Atualizado:</span> <span id="lastUpdate">--</span>
            </div>
        </section>

        <section class="purchasing-card">
            <div class="purchasing-header">
                <h2 class="section-title" data-pt="Poder de Compra em Sats" data-en="Purchasing Power in Sats">Poder de Compra em Sats</h2>
            </div>
            <div class="purchasing-list" id="purchasingList">
                <!-- Items rendered by JS -->
            </div>
            <div class="add-item-form" id="addItemForm">
                <input type="text" id="newItemName" data-pt="Nome do item" data-en="Item name" placeholder="Nome do item" maxlength="40" autocomplete="off">
                <input type="text" id="newItemPrice" inputmode="decimal" data-pt="Preco em R$" data-en="Price in R$" placeholder="Preço em R$" autocomplete="off">
                <button id="addItemBtn" class="btn-add" title="Adicionar item">+</button>
            </div>
        </section>

        <footer class="footer">
            <p data-pt="Cotacoes via CoinGecko API. Atualizacao a cada 30s." data-en="Quotes via CoinGecko API. Updated every 30s.">Cotações via CoinGecko API. Atualização a cada 30s.</p>
            <p data-pt='Feito por <a href="https://letabuild.com" target="_blank" rel="noopener">letabuild.com</a>' data-en='Made by <a href="https://letabuild.com" target="_blank" rel="noopener">letabuild.com</a>'>Feito por <a href="https://letabuild.com" target="_blank" rel="noopener">letabuild.com</a></p>
        </footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/converter.js"></script>
    <script src="js/purchasing.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
