name: Atualizar dados DCA

on:
  schedule:
    # Todo dia às 9h UTC (6h de Brasília)
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Permite trigger manual pelo GitHub Actions UI

permissions:
  contents: write   # necessário para commitar e fazer push

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install yfinance requests pandas

      - name: Executar script de atualização
        run: python scripts/update_dca_data.py

      - name: Commitar e publicar se houver mudanças
        run: |
          git config user.name  "letabuild-bot"
          git config user.email "bot@letabuild.com"
          git add dca/index.html
          if git diff --staged --quiet; then
            echo "Nenhuma mudança nos dados. Nada a commitar."
          else
            MONTH=$(date '+%Y-%m')
            git commit -m "DCA: atualização automática de dados (${MONTH})"
            git push
            echo "Dados atualizados e publicados com sucesso!"
          fi
