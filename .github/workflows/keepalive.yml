name: Supabase Keepalive

on:
  schedule:
    - cron: '0 9 * * 1,4'  # Monday and Thursday at 9am UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: SUPABASE_URL or SUPABASE_ANON_KEY secrets are not configured."
            echo "Go to repo Settings > Secrets and variables > Actions and add them."
            exit 1
          fi

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/habit_data?select=count&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          echo "HTTP status: ${HTTP_CODE}"
          echo "Supabase pinged at $(date -u)"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "Success!"
          else
            echo "Warning: Supabase returned HTTP ${HTTP_CODE}"
            exit 1
          fi
