name: Atualizar dados Simulador 51%

on:
  schedule:
    # Todo dia às 9h15 UTC (6h15 de Brasília)
    - cron: '15 9 * * *'
  workflow_dispatch:
    # Permite trigger manual pelo GitHub Actions UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Executar script de atualização
        run: python scripts/update_51_data.py

      - name: Commitar e publicar se houver mudanças
        run: |
          git config user.name  "letabuild-bot"
          git config user.email "bot@letabuild.com"
          git add 51/data/network.json
          if git diff --staged --quiet; then
            echo "Nenhuma mudança nos dados. Nada a commitar."
          else
            git commit -m "51%: atualização automática de dados ($(date '+%Y-%m-%d'))"
            git push
            echo "Dados atualizados e publicados com sucesso!"
          fi
