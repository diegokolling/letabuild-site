name: Update 51% Simulator Data

on:
  schedule:
    - cron: '0 12 * * *'  # Roda todo dia ao meio-dia UTC (9h BRT)
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update network data
        run: python scripts/update_51_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "CaioLeta21"
          git config user.email "caioleta@gmail.com"
          git diff --quiet 51/data/network.json || {
            git add 51/data/network.json
            git commit -m "Update 51% simulator data ($(date -u +%Y-%m-%d))"
            git push
          }
